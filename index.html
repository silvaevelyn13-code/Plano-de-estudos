<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano de Estudos — Gestão de Projetos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2335;--surface3:#232840;
  --border:#2a2f45;--border2:#363d5a;--text:#e8eaf0;--muted:#6b7494;
  --accent:#c0392b;--accent2:#e74c3c;--green:#2ecc71;--green2:#27ae60;
  --yellow:#f1c40f;--blue:#3498db;--purple:#9b59b6;--orange:#e67e22;
  --teal:#1abc9c;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:14px}
button{cursor:pointer;font-family:var(--font)}

/* ── HEADER ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo h1{font-size:14px;font-weight:600}
.logo p{font-size:11px;color:var(--muted);margin-top:1px}
.period{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-size:11px;color:var(--muted);font-family:var(--mono)}

/* ── STATS ── */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--surface);padding:14px 20px}
.stat .val{font-size:20px;font-weight:700;font-family:var(--mono)}
.stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

/* ── PROGRESS ── */
.prog-wrap{padding:14px 28px;background:var(--surface);border-bottom:1px solid var(--border)}
.prog-hd{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.prog-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100vh - 148px)}

/* ── SIDEBAR ── */
.sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0}
.sb-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:0 14px 5px}
.mbtn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 14px;background:transparent;border:none;color:var(--text);font-size:12px;text-align:left;transition:background .15s}
.mbtn:hover{background:var(--surface2)}
.mbtn.active{background:var(--surface2);border-left:2px solid var(--accent);padding-left:12px}
.mbtn .mk{font-size:10px;padding:2px 6px;border-radius:8px;background:var(--surface2);color:var(--muted);font-family:var(--mono)}
.mbtn.av-month .mk{background:rgba(231,76,60,.2);color:var(--accent2)}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:20px 28px}
.month-hd{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.month-hd h2{font-size:18px;font-weight:600}
.av-tag{font-size:11px;padding:3px 9px;border-radius:10px;background:rgba(231,76,60,.15);color:var(--accent2);border:1px solid rgba(231,76,60,.25)}

/* ── WEEK CARD ── */
.wcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.wcard:hover{border-color:var(--border2)}
.wcard.done{border-color:rgba(46,204,113,.3)}
.wcard.done .whead{background:rgba(46,204,113,.05)}

.whead{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none}
.chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:transparent;transition:all .2s}
.chk:hover{border-color:var(--green)}
.wcard.done .chk{background:var(--green);border-color:var(--green);color:#fff}
.winfo{flex:1;min-width:0}
.wtop{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.wnum{font-size:10px;font-family:var(--mono);color:var(--muted);background:var(--surface2);padding:2px 5px;border-radius:4px}
.wdates{font-size:11px;color:var(--muted)}
.wdisc{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.wright{display:flex;align-items:center;gap:8px;flex-shrink:0}
.chip{font-size:10px;font-family:var(--mono);padding:3px 7px;border-radius:5px;background:var(--surface2);color:var(--muted)}
.chip.av{background:rgba(231,76,60,.15);color:var(--accent2)}
.arr{font-size:11px;color:var(--muted);transition:transform .2s}
.wcard.open .arr{transform:rotate(90deg)}

/* ── WEEK BODY ── */
.wbody{display:none;border-top:1px solid var(--border)}
.wcard.open .wbody{display:block}

/* tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface2)}
.tab{padding:9px 16px;font-size:12px;font-weight:500;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent2)}

.tab-panel{display:none;padding:16px}
.tab-panel.active{display:block}

/* content blocks */
.blocks-list{display:flex;flex-direction:column;gap:8px}
.block-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.block-head{display:flex;align-items:center;gap:8px;padding:10px 12px}
.block-num{font-size:10px;font-family:var(--mono);color:var(--muted);background:var(--bg);padding:2px 6px;border-radius:4px;flex-shrink:0}
.block-title{font-size:13px;font-weight:500;flex:1}
.block-done-chk{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all .15s;flex-shrink:0}
.block-done-chk:hover{border-color:var(--green)}
.block-item.bdone .block-done-chk{background:var(--green2);border-color:var(--green2);color:#fff}
.block-item.bdone .block-title{color:var(--muted);text-decoration:line-through}
.block-desc{padding:0 12px 12px;font-size:12px;color:var(--muted);line-height:1.6;white-space:pre-wrap}
.block-actions{display:flex;gap:6px;padding:0 12px 10px}
.btn-sm{font-size:11px;padding:4px 9px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s}
.btn-sm:hover{color:var(--text);border-color:var(--border2);background:var(--surface3)}
.btn-sm.danger:hover{color:var(--accent2);border-color:var(--accent2)}

.add-block-btn{display:flex;align-items:center;gap:6px;width:100%;padding:9px 12px;border:1px dashed var(--border2);border-radius:8px;background:transparent;color:var(--muted);font-size:12px;transition:all .15s;margin-top:4px}
.add-block-btn:hover{color:var(--text);border-color:var(--blue);background:rgba(52,152,219,.05)}

/* resources */
.resources-list{display:flex;flex-direction:column;gap:6px}
.res-item{display:flex;align-items:flex-start;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 12px}
.res-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.res-body{flex:1;min-width:0}
.res-type{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:2px}
.res-title{font-size:12px;font-weight:500}
.res-detail{font-size:11px;color:var(--muted);margin-top:2px}
.res-link{font-size:11px;color:var(--blue);word-break:break-all;margin-top:2px;text-decoration:none}
.res-link:hover{text-decoration:underline}
.res-acts{display:flex;gap:6px;margin-top:6px}
.res-del{font-size:11px;padding:3px 7px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted)}
.res-del:hover{color:var(--accent2);border-color:var(--accent2)}

.add-res-btn{display:flex;align-items:center;gap:6px;width:100%;padding:9px 12px;border:1px dashed var(--border2);border-radius:7px;background:transparent;color:var(--muted);font-size:12px;transition:all .15s;margin-top:4px}
.add-res-btn:hover{color:var(--text);border-color:var(--purple);background:rgba(155,89,182,.05)}

/* notes tab */
.notes-area{width:100%;min-height:120px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);font-size:12px;padding:10px 12px;resize:vertical;line-height:1.6}
.notes-area:focus{outline:none;border-color:var(--blue)}
.notes-save{font-size:11px;padding:5px 12px;border-radius:5px;border:1px solid var(--blue);background:rgba(52,152,219,.1);color:var(--blue);margin-top:6px}
.notes-save:hover{background:rgba(52,152,219,.2)}
.notes-saved{font-size:11px;color:var(--green);margin-top:6px;display:none}

/* schedule */
.sched-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.sday{background:var(--surface2);border-radius:6px;padding:8px 4px;text-align:center}
.sday .dn{font-size:10px;color:var(--muted);margin-bottom:3px}
.sday .dh{font-size:12px;font-family:var(--mono);font-weight:500}
.sday.sh .dh{color:var(--blue)}
.sday.rest .dh{color:var(--border2)}
.wcard.done .wbody .done-note{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green);padding:10px 16px;border-top:1px solid var(--border)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:0}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:15px;font-weight:600}
.modal-close{background:transparent;border:none;color:var(--muted);font-size:18px;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--font);font-size:13px;padding:9px 11px}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--blue)}
.field textarea{min-height:80px;resize:vertical;line-height:1.5}
.field select option{background:var(--surface2)}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.btn-cancel{padding:7px 16px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:13px}
.btn-cancel:hover{color:var(--text)}
.btn-confirm{padding:7px 16px;border-radius:7px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:500}
.btn-confirm:hover{background:var(--accent2)}

/* legend */
.legend{padding:12px 28px;background:var(--surface);border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:8px 18px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-dot{width:7px;height:7px;border-radius:50%}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ===== RESPONSIVIDADE IPHONE ===== */

@media (max-width: 768px) {


  .stats-bar {
    grid-template-columns: repeat(3, minmax(90px, 1fr));
    gap: 0;
  }


  .stat {
  padding: 8px 6px;
  height: auto;
  min-height: unset;
}
  
  .stats-bar {
  grid-template-columns: repeat(3, minmax(90px, 1fr));
  gap: 1px;
}

  .stat {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 1px;
    min-height: 52px;
    padding: 8px 6px;
  }

  .stat .val {
    font-size: 15px;
      line-height: 1;
}

  .stat .lbl {
    font-size: 8px;
    line-height: 1;
    white-space: nowrap;
  }

}
  
header {
  padding: 10px 14px;
  gap: 10px;
  flex-wrap: nowrap;
  align-items: center;
}

.logo h1 {
  font-size: 15px; /* ↑ maior que antes */
  font-weight: 600;
  line-height: 1.1;
}

.logo p {
  display: none; /* mantém limpo */
}

.logo {
  min-width: 0;
  flex: 1;
}

.period {
  font-size: 10px;
  padding: 4px 8px;
  white-space: nowrap;
  flex-shrink: 0;
}
  
header {
  padding: 10px 14px;
  gap: 10px;
}

.logo h1 {
  font-size: 13px;
  line-height: 1.1;
}

.logo p {
  display: none; /* isso reduz MUITO a altura */
}

.period {
  font-size: 10px;
  padding: 4px 8px;
  white-space: nowrap;
}
  
  
  .layout {
    flex-direction: column;
    height: auto;
  }

  .sidebar {
    width: 100%;
    min-width: 100%;
    border-right: none;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: row;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 8px;
    gap: 6px;
    -webkit-overflow-scrolling: touch; /* rolagem suave no iPhone */
    scrollbar-width: none; /* esconde scrollbar no Firefox */
  }

  .sidebar::-webkit-scrollbar {
    display: none; /* esconde scrollbar no Chrome/Safari */
  }

  .mbtn {
    flex-shrink: 0;
    width: auto;
    white-space: nowrap;
    border-radius: 8px;
    border: 1px solid var(--border);
    padding: 6px 12px;
  }

  .mbtn.active {
    border-left: 1px solid var(--accent); /* reseta o border-left especial */
    background: var(--surface2);
    border-color: var(--accent);
    padding-left: 12px; /* volta ao normal */
  }

  .sb-label {
    display: none;
  }

  .mbtn {
    width: auto;
    min-width: max-content;
    border-radius: 8px;
    margin-right: 6px;
  }

  .main {
    padding: 12px;
  }

.month-dropdown {
  position: relative;
  width: 100%;
}

.month-toggle {
  width: 100%;
  padding: 8px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 12px;
  border-radius: 8px;
}

/* 👇 A PARTE IMPORTANTE */
.month-list {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  overflow-y: hidden;
  white-space: nowrap;
  padding: 8px 6px;
  -webkit-overflow-scrolling: touch;
}

/* impede quebra de linha dos botões */
.month-list .mbtn {
  flex: 0 0 auto;
}

  .whead {
    flex-wrap: wrap;
  }

  .wright {
    width: 100%;
    justify-content: flex-start;
    margin-top: 8px;
  }

  .tabs {
    overflow-x: auto;
    white-space: nowrap;
  }

  .tab {
    flex-shrink: 0;
  }

  .sched-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
  
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📋</div>
    <div>
      <h1>Plano de Estudos</h1>
      <p>Pós-graduação em Gestão de Projetos · Mackenzie EAD</p>
    </div>
  </div>
  <div class="period">15/06/2026 → 13/06/2027</div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="val" id="s-sem">0/52</div><div class="lbl">Semanas concluídas</div></div>
  <div class="stat"><div class="val" id="s-disc">0/12</div><div class="lbl">Disciplinas concluídas</div></div>
  <div class="stat"><div class="val" id="s-h">0h</div><div class="lbl">Horas estudadas</div></div>
  <div class="stat"><div class="val" id="s-av">0/12</div><div class="lbl">Avaliações realizadas</div></div>
  <div class="stat"><div class="val" id="s-pct">0%</div><div class="lbl">Progresso geral</div></div>
</div>

<div class="prog-wrap">
  <div class="prog-hd"><span>Progresso do curso</span><span id="p-lbl" style="font-family:var(--mono)">0 / 360h</span></div>
  <div class="prog-track"><div class="prog-fill" id="p-fill" style="width:0%"></div></div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

<div class="legend" id="legend"></div>

<!-- MODAL: Add/Edit Block -->
<div class="overlay" id="modalBlock">
  <div class="modal">
    <div class="modal-head">
      <h3 id="mb-title">Novo bloco de conteúdo</h3>
      <button class="modal-close" onclick="closeModal('modalBlock')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Título do bloco</label><input id="mb-ttl" type="text" placeholder="Ex: Governança de Projetos"></div>
      <div class="field"><label>Descrição / conteúdo</label><textarea id="mb-desc" placeholder="Descreva o conteúdo, tópicos abordados, anotações..."></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal('modalBlock')">Cancelar</button>
      <button class="btn-confirm" id="mb-save">Salvar bloco</button>
    </div>
  </div>
</div>

<!-- MODAL: Add Resource -->
<div class="overlay" id="modalRes">
  <div class="modal">
    <div class="modal-head">
      <h3 id="mr-title">Novo recurso</h3>
      <button class="modal-close" onclick="closeModal('modalRes')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Tipo</label>
        <select id="mr-type">
          <option value="📚">📚 Livro / Leitura</option>
          <option value="🎬">🎬 Filme / Série / Documentário</option>
          <option value="🎙️">🎙️ Podcast</option>
          <option value="📄">📄 Artigo / Paper</option>
          <option value="🌐">🌐 Site / Link</option>
          <option value="🎥">🎥 Vídeo / Aula</option>
          <option value="📝">📝 Outro</option>
        </select>
      </div>
      <div class="field"><label>Título</label><input id="mr-ttl" type="text" placeholder="Nome do recurso"></div>
      <div class="field"><label>Detalhe (autor, descrição…)</label><input id="mr-det" type="text" placeholder="Ex: Harold Kerzner · Blucher, 2015"></div>
      <div class="field"><label>Link (opcional)</label><input id="mr-link" type="url" placeholder="https://..."></div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal('modalRes')">Cancelar</button>
      <button class="btn-confirm" id="mr-save">Salvar recurso</button>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────
   STATIC DATA
───────────────────────────────────────── */
const DISC=[
  {name:"Introdução à Gestão de Projetos",          short:"Introdução à Gestão de Projetos",            color:"#3498db"},
  {name:"Controle de Execução: Escopo e Cronograma",short:"Escopo e Cronograma",        color:"#2ecc71"},
  {name:"Gestão de Custos, Aquisições e Contratações",short:"Custos e Aquisições",      color:"#e67e22"},
  {name:"Gestão de Mudanças e do Conhecimento",     short:"Mudanças e Conhecimento",    color:"#e91e63"},
  {name:"Gestão de Informações e da Comunicação",   short:"Informações e Comunicação",  color:"#9b59b6"},
  {name:"Gestão da Qualidade",                      short:"Qualidade",                  color:"#27ae60"},
  {name:"Gestão das Incertezas e Mitigações",       short:"Incertezas e Riscos",        color:"#e74c3c"},
  {name:"Gerenciamento Ágil de Projetos",           short:"Ágil (Scrum/Kanban)",        color:"#00bcd4"},
  {name:"Gestão de Pessoas e Liderança",            short:"Pessoas e Liderança",        color:"#ff9800"},
  {name:"Escritório de Projetos e Integração",      short:"Escritório de Projetos",     color:"#8bc34a"},
  {name:"Ferramentas para Gestão de Projetos",      short:"MS Project",                 color:"#673ab7"},
  {name:"Simulação de Gestão de Projetos",          short:"Simulação Final",            color:"#f44336"},
];

// Default content blocks per discipline (4 each)
const DEF_BLOCKS=[

/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
function loadState(){
  try{ return JSON.parse(localStorage.getItem('gp2_state')||'{}') }catch(e){return{}}
}
let ST=loadState();
function save(){ localStorage.setItem('gp2_state',JSON.stringify(ST)) }

// get blocks for week n, disc d
function getBlocks(wn,disc){
  const key='blocks_w'+wn;
  if(!ST[key]){
    // seed with default blocks for this discipline
    ST[key]=DEF_BLOCKS[disc].map((b,i)=>({id:'b'+wn+'_'+i,title:b.t,desc:b.d,done:false}));
    save();
  }
  return ST[key];
}
function getResources(disc){
  const key='res_d'+disc;
  if(!ST[key]){
    ST[key]=DEF_RES[disc].map((r,i)=>({id:'r'+disc+'_'+i,...r}));
    save();
  }
  return ST[key];
}

let activeMonth=MONTHS[0].id;

/* ─────────────────────────────────────────
   STATS
───────────────────────────────────────── */
function updateStats(){
  let doneW=0,doneH=0,doneAv=0;
  const discSet=new Set();
  MONTHS.forEach(m=>m.weeks.forEach(w=>{
    if(ST['w'+w.n]){doneW++;doneH+=w.hours;if(w.av)doneAv++;discSet.add(w.disc);}
  }));
  document.getElementById('s-sem').textContent=doneW+'/52';
  document.getElementById('s-disc').textContent=discSet.size+'/12';
  document.getElementById('s-h').textContent=doneH+'h';
  document.getElementById('s-av').textContent=doneAv+'/12';
  const pct=Math.round(doneH/360*100);
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('p-fill').style.width=pct+'%';
  document.getElementById('p-lbl').textContent=doneH+' / 360h';
  MONTHS.forEach(m=>{
    const btn=document.getElementById('mb_'+m.id);
    if(!btn)return;
    const done=m.weeks.filter(w=>ST['w'+w.n]).length;
    btn.querySelector('.mk').textContent=done+'/'+m.weeks.length;
  });
}

/* ─────────────────────────────────────────
   SIDEBAR
───────────────────────────────────────── */
function renderSidebar(){
  let h = `
    <div class="month-dropdown">
      <button class="month-toggle" onclick="this.parentElement.classList.toggle('open')">
        Meses
      </button>

      <div class="month-list">
  `;

  MONTHS.forEach(m=>{
    const hasAv=m.weeks.some(w=>w.av);
    const done=m.weeks.filter(w=>ST['w'+w.n]).length;

    h+=`
      <button id="mb_${m.id}"
        class="mbtn ${hasAv?'av-month':''} ${m.id===activeMonth?'active':''}"
        onclick="selMonth('${m.id}')">
        ${m.label}
        <span class="mk">${done}/${m.weeks.length}</span>
      </button>
    `;
  });

  h+=`</div></div>`;

  document.getElementById('sidebar').innerHTML=h;
}

function selMonth(id){
  activeMonth=id;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('mb_'+id);
  if(btn)btn.classList.add('active');
  renderMain();
}

───────────────────────────────────────── */
function sched(h){
  const s=h<=4?[0,0,2,0,0,1,1]:[0,2,0,2,0,2,2];
  const days=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  return days.map((d,i)=>`<div class="sday ${s[i]>0?'sh':'rest'}">
    <div class="dn">${d}</div><div class="dh">${s[i]>0?s[i]+'h':'—'}</div>
  </div>`).join('');
}

function renderMain(){
  const m=MONTHS.find(x=>x.id===activeMonth);
  const hasAv=m.weeks.some(w=>w.av);
  let h=`<div class="month-hd"><h2>${m.label}</h2>${hasAv?'<span class="av-tag">📝 Avaliação este mês</span>':''}</div>`;

  m.weeks.forEach(w=>{
    const d=DISC[w.disc];
    const done=!!ST['w'+w.n];
    const isOpen=!!ST['open_'+w.n];
    const activeTab=ST['tab_'+w.n]||'content';

    h+=`<div class="wcard ${done?'done':''} ${isOpen?'open':''}" id="wcard${w.n}">
      <div class="whead" onclick="toggleOpen(${w.n})">
        <button class="chk" onclick="event.stopPropagation();toggleWeek(${w.n})" title="Marcar semana como concluída">✓</button>
        <div class="winfo">
          <div class="wtop">
            <span class="wnum">S${w.n}</span>
            <span class="wdates">📅 ${w.dates}</span>
          </div>
          <div class="wdisc"><span class="dot" style="background:${d.color}"></span>${d.short}</div>
        </div>
        <div class="wright">
          <span class="chip">⏱ ${w.hours}h</span>
          ${w.av?'<span class="chip av">📝 Avaliação</span>':''}
          <span class="arr">▶</span>
        </div>
      </div>
      <div class="wbody">
        <div class="tabs">
          <button class="tab ${activeTab==='content'?'active':''}" onclick="setTab(${w.n},'content')">📖 Conteúdos</button>
          <button class="tab ${activeTab==='resources'?'active':''}" onclick="setTab(${w.n},'resources')">📚 Recursos</button>
          <button class="tab ${activeTab==='schedule'?'active':''}" onclick="setTab(${w.n},'schedule')">📅 Horários</button>
          <button class="tab ${activeTab==='notes'?'active':''}" onclick="setTab(${w.n},'notes')">📝 Anotações</button>
        </div>

        <!-- CONTENT TAB -->
        <div class="tab-panel ${activeTab==='content'?'active':''}" id="tp-content-${w.n}">
          <div class="blocks-list" id="blist-${w.n}">
            ${renderBlocks(w.n,w.disc)}
          </div>
          <button class="add-block-btn" onclick="openAddBlock(${w.n},${w.disc})">＋ Adicionar bloco de conteúdo</button>
          ${w.recap?`<div style="margin-top:10px;padding:9px 12px;border-radius:7px;background:rgba(52,152,219,.08);border:1px solid rgba(52,152,219,.2);font-size:12px;color:#7fb3d9">🔁 Semana de revisão — revisar todos os blocos antes da avaliação</div>`:''}
          ${w.av?`<div style="margin-top:8px;padding:9px 12px;border-radius:7px;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.2);font-size:12px;color:#e07070">📝 Realizar a Avaliação Virtual (AV) no AVA — nota mínima 7,0</div>`:''}
          ${w.note?`<div style="margin-top:8px;padding:9px 12px;border-radius:7px;background:rgba(241,196,15,.07);border:1px solid rgba(241,196,15,.2);font-size:12px;color:#e8d07a">⚠️ ${w.note}</div>`:''}
        </div>

        <!-- RESOURCES TAB -->
        <div class="tab-panel ${activeTab==='resources'?'active':''}" id="tp-resources-${w.n}">
          <div class="resources-list" id="rlist-${w.n}">
            ${renderResources(w.disc)}
          </div>
          <button class="add-res-btn" onclick="openAddRes(${w.disc},${w.n})">＋ Adicionar recurso (livro, filme, link…)</button>
        </div>

        <!-- SCHEDULE TAB -->
        <div class="tab-panel ${activeTab==='schedule'?'active':''}" id="tp-schedule-${w.n}">
          <p style="font-size:12px;color:var(--muted);margin-bottom:10px">Sugestão de distribuição para ${w.hours}h nesta semana:</p>
          <div class="sched-grid">${sched(w.hours)}</div>
          <p style="font-size:11px;color:var(--muted);margin-top:10px">💡 Adapte conforme sua rotina. Nos dias com compromissos, pule sem culpa — o plano tem folga embutida.</p>
        </div>

        <!-- NOTES TAB -->
        <div class="tab-panel ${activeTab==='notes'?'active':''}" id="tp-notes-${w.n}">
          <textarea class="notes-area" id="notes-${w.n}" placeholder="Suas anotações, dúvidas, insights desta semana...">${ST['notes_'+w.n]||''}</textarea>
          <div style="display:flex;align-items:center;gap:10px">
            <button class="notes-save" onclick="saveNotes(${w.n})">💾 Salvar anotações</button>
            <span class="notes-saved" id="ns-${w.n}">✅ Salvo!</span>
          </div>
        </div>

        ${done?`<div class="done-note">✅ Semana concluída!</div>`:''}
      </div>
    </div>`;
  });

  document.getElementById('main').innerHTML=h;
}

function renderBlocks(wn,disc){
  const blocks=getBlocks(wn,disc);
  if(!blocks.length)return'<p style="font-size:12px;color:var(--muted);padding:4px 0">Nenhum bloco ainda. Adicione um abaixo.</p>';
  return blocks.map((b,i)=>`
    <div class="block-item ${b.done?'bdone':''}" id="bi-${wn}-${i}">
      <div class="block-head">
        <span class="block-num">${String(i+1).padStart(2,'0')}</span>
        <span class="block-title">${escHtml(b.title)}</span>
        <button class="block-done-chk" onclick="toggleBlock(${wn},${disc},${i})" title="Marcar conteúdo como estudado">✓</button>
      </div>
      ${b.desc?`<div class="block-desc">${escHtml(b.desc)}</div>`:''}
      <div class="block-actions">
        <button class="btn-sm" onclick="openEditBlock(${wn},${disc},${i})">✏️ Editar</button>
        <button class="btn-sm danger" onclick="deleteBlock(${wn},${disc},${i})">🗑 Remover</button>
      </div>
    </div>`).join('');
}

function renderResources(disc){
  const res=getResources(disc);
  if(!res.length)return'<p style="font-size:12px;color:var(--muted);padding:4px 0">Nenhum recurso ainda.</p>';
  return res.map((r,i)=>`
    <div class="res-item" id="ri-${disc}-${i}">
      <div class="res-icon">${r.icon||'📄'}</div>
      <div class="res-body">
        <div class="res-type">${r.type||''}</div>
        <div class="res-title">${escHtml(r.title)}</div>
        ${r.detail?`<div class="res-detail">${escHtml(r.detail)}</div>`:''}
        ${r.link?`<a class="res-link" href="${escHtml(r.link)}" target="_blank">${escHtml(r.link)}</a>`:''}
        <div class="res-acts">
          <button class="res-del btn-sm danger" onclick="deleteRes(${disc},${i})">🗑 Remover</button>
        </div>
      </div>
    </div>`).join('');
}

/* ─────────────────────────────────────────
   INTERACTIONS
───────────────────────────────────────── */
function toggleWeek(wn){
  ST['w'+wn]=!ST['w'+wn];save();updateStats();renderMain();
}
function toggleOpen(wn){
  ST['open_'+wn]=!ST['open_'+wn];save();
  const c=document.getElementById('wcard'+wn);
  if(c){c.classList.toggle('open',!!ST['open_'+wn]);}
}
function setTab(wn,tab){
  ST['tab_'+wn]=tab;save();
  // update without full re-render
  const card=document.getElementById('wcard'+wn);
  if(!card)return;
  card.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  card.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const tabs=['content','resources','schedule','notes'];
  const idx=tabs.indexOf(tab);
  if(idx>-1){
    card.querySelectorAll('.tab')[idx].classList.add('active');
    card.querySelectorAll('.tab-panel')[idx].classList.add('active');
  }
}
function toggleBlock(wn,disc,idx){
  const blocks=getBlocks(wn,disc);
  blocks[idx].done=!blocks[idx].done;
  ST['blocks_w'+wn]=blocks;save();
  const el=document.getElementById('bi-'+wn+'-'+idx);
  if(el)el.classList.toggle('bdone',blocks[idx].done);
}
function saveNotes(wn){
  const ta=document.getElementById('notes-'+wn);
  if(!ta)return;
  ST['notes_'+wn]=ta.value;save();
  const msg=document.getElementById('ns-'+wn);
  if(msg){msg.style.display='flex';setTimeout(()=>msg.style.display='none',2000);}
}

function deleteBlock(wn,disc,idx){
  if(!confirm('Remover este bloco?'))return;
  const blocks=getBlocks(wn,disc);
  blocks.splice(idx,1);
  ST['blocks_w'+wn]=blocks;save();
  document.getElementById('blist-'+wn).innerHTML=renderBlocks(wn,disc);
}
function deleteRes(disc,idx){
  if(!confirm('Remover este recurso?'))return;
  const res=getResources(disc);
  res.splice(idx,1);
  ST['res_d'+disc]=res;save();
  // find current week showing this disc to re-render resource list
  MONTHS.forEach(m=>m.weeks.forEach(w=>{
    if(w.disc===disc){
      const el=document.getElementById('rlist-'+w.n);
      if(el)el.innerHTML=renderResources(disc);
    }
  }));
}

/* ─────────────────────────────────────────
   MODAL: ADD/EDIT BLOCK
───────────────────────────────────────── */
let _mb={wn:0,disc:0,idx:-1};
function openAddBlock(wn,disc){
  _mb={wn,disc,idx:-1};
  document.getElementById('mb-title').textContent='Novo bloco de conteúdo';
  document.getElementById('mb-ttl').value='';
  document.getElementById('mb-desc').value='';
  document.getElementById('mb-save').onclick=saveBlock;
  openModal('modalBlock');
}
function openEditBlock(wn,disc,idx){
  _mb={wn,disc,idx};
  const blocks=getBlocks(wn,disc);
  const b=blocks[idx];
  document.getElementById('mb-title').textContent='Editar bloco';
  document.getElementById('mb-ttl').value=b.title;
  document.getElementById('mb-desc').value=b.desc||'';
  document.getElementById('mb-save').onclick=saveBlock;
  openModal('modalBlock');
}
function saveBlock(){
  const title=document.getElementById('mb-ttl').value.trim();
  if(!title){alert('Informe um título para o bloco.');return;}
  const desc=document.getElementById('mb-desc').value.trim();
  const blocks=getBlocks(_mb.wn,_mb.disc);
  if(_mb.idx===-1){
    blocks.push({id:'b'+_mb.wn+'_'+Date.now(),title,desc,done:false});
  } else {
    blocks[_mb.idx].title=title;
    blocks[_mb.idx].desc=desc;
  }
  ST['blocks_w'+_mb.wn]=blocks;save();
  closeModal('modalBlock');
  const el=document.getElementById('blist-'+_mb.wn);
  if(el)el.innerHTML=renderBlocks(_mb.wn,_mb.disc);
}

/* ─────────────────────────────────────────
   MODAL: ADD RESOURCE
───────────────────────────────────────── */
let _mr={disc:0,wn:0};
function openAddRes(disc,wn){
  _mr={disc,wn};
  document.getElementById('mr-title').textContent='Novo recurso';
  document.getElementById('mr-type').value='📚';
  document.getElementById('mr-ttl').value='';
  document.getElementById('mr-det').value='';
  document.getElementById('mr-link').value='';
  document.getElementById('mr-save').onclick=saveRes;
  openModal('modalRes');
}
function saveRes(){
  const title=document.getElementById('mr-ttl').value.trim();
  if(!title){alert('Informe o título do recurso.');return;}
  const icon=document.getElementById('mr-type').value;
  const typeMap={'📚':'Livro','🎬':'Filme / Série','🎙️':'Podcast','📄':'Artigo','🌐':'Site','🎥':'Vídeo','📝':'Outro'};
  const res=getResources(_mr.disc);
  res.push({
    id:'r'+_mr.disc+'_'+Date.now(),
    icon,type:typeMap[icon]||'Outro',
    title,
    detail:document.getElementById('mr-det').value.trim(),
    link:document.getElementById('mr-link').value.trim(),
  });
  ST['res_d'+_mr.disc]=res;save();
  closeModal('modalRes');
  MONTHS.forEach(m=>m.weeks.forEach(w=>{
    if(w.disc===_mr.disc){
      const el=document.getElementById('rlist-'+w.n);
      if(el)el.innerHTML=renderResources(_mr.disc);
    }
  }));
}

/* ─────────────────────────────────────────
   MODAL HELPERS
───────────────────────────────────────── */
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
document.addEventListener('click',e=>{
  ['modalBlock','modalRes'].forEach(id=>{
    const ov=document.getElementById(id);
    if(e.target===ov)closeModal(id);
  });
});

/* ─────────────────────────────────────────
   LEGEND
───────────────────────────────────────── */
function renderLegend(){
  document.getElementById('legend').innerHTML=DISC.map(d=>
    `<div class="leg-item"><div class="leg-dot" style="background:${d.color}"></div>${d.short}</div>`
  ).join('');
}

/* ─────────────────────────────────────────
   UTILS
───────────────────────────────────────── */
function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleMonths(){
  document.querySelector('.month-dropdown')
    .classList.toggle('open');
}

  
/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
renderSidebar();
renderMain();
renderLegend();
updateStats();
</script>
</body>
</html>
